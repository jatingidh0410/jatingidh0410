name: Update GitHub Trophy

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at 00:00 UTC
  workflow_dispatch:      # Allows manual run from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: jatingidh0410
          output_path: trophy.svg
          theme: dracula
          column: 4
          row: 1
          margin_w: 25
          margin_h: 25
          title: Followers,Stars,Commits,Experience
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add trophy.svg
            git commit -m "chore: update trophy stats"
            git push
          else
            echo "No changes to commit"
          fi
