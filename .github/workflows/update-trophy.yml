name: Update GitHub Trophy

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Download Trophy Generator
        run: |
          git clone https://github.com/ryo-ma/github-profile-trophy.git
          cd github-profile-trophy

      - name: Generate SVG
        run: |
          cd github-profile-trophy
          deno run --allow-net --allow-env --allow-read --allow-write render_svg.ts \
          jatingidh0410 ../trophy.svg dracula \
          --title Followers,Stars,Commits,Experience \
          --column 4 \
          --row 1 \
          --margin-w 25 \
          --margin-h 25

      - name: Commit and push if changed
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add trophy.svg
            git commit -m "chore: update trophy stats"
            git push
          else
            echo "No changes to commit"
          fi
